    <script>
        // --- GESTIONE TEMA DA PREFERENZE ---
        (function applicaTema() {
            try {
                let prefStr = localStorage.getItem('preferenze_layout_haze');
                if (prefStr) {
                    let prefs = JSON.parse(prefStr);
                    let theme = prefs.theme || 'system';
                    if (theme !== 'system') {
                        document.documentElement.setAttribute('data-theme', theme);
                    } else {
                        document.documentElement.removeAttribute('data-theme');
                    }
                } else {
                    const oldTheme = localStorage.getItem('theme');
                    if (oldTheme && oldTheme !== 'system') document.documentElement.setAttribute('data-theme', oldTheme);
                }
            } catch(e) {}
        })();
    </script>

        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 28px 24px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%); color: white; }
        .sidebar-header h3 { margin:0; font-weight: 700; display: flex; align-items: center; gap: 10px;}

        .sidebar-link:active, .sidebar-link:hover { background-color: var(--surface-hover); color: var(--primary); padding-left: 28px; }

        #content-area { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 14px; }
        
        /* PULSANTI E LISTA */
        .folder-btn { background-color: var(--surface); color: var(--primary); border: 1px solid var(--border-color); padding: 20px; font-size: 16px; border-radius: var(--radius-md); cursor: pointer; text-decoration: none; text-align: left; font-weight: 700; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-sm); transition: all 0.2s; animation: slideInUp 0.3s ease both; }

        .file-row { display: flex; gap: 12px; width: 100%; animation: slideInUp 0.4s ease both; }

        .file-btn:active { background-color: var(--surface-hover); transform: scale(0.98); }
        .download-btn { background-color: var(--primary); color: white; border: none; padding: 14px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 54px; font-size: 18px; box-shadow: 0 4px 10px rgba(0, 102, 204, 0.3); transition: all 0.2s; }

        .back-btn { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 14px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; width: 100%; font-weight: 600; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .back-btn:active { background-color: var(--surface-hover); }

        .status-message { text-align: center; color: var(--text-muted); font-size: 15px; font-weight: 500; padding: 40px 20px; background: var(--surface-hover); border-radius: var(--radius-md); border: 1px dashed var(--border-color); display: flex; flex-direction: column; align-items: center; gap: 12px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        <div class="status-message">

            Caricamento indice file...

    <script>
        function apriMenuLaterale() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').style.display = 'block'; }
        function chiudiMenuLaterale() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').style.display = 'none'; }

        let mappaAlbero = [];
        let numCartelle = 0;

        async function downloadForzato(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const urlBlob = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = urlBlob; a.download = filename;
                document.body.appendChild(a); a.click();
                window.URL.revokeObjectURL(urlBlob);
            } catch (e) { window.open(url, '_blank'); }
        }

        async function init() {
            const area = document.getElementById('content-area');
            try {
                // Leggiamo la mappa locale generata dall'Admin
                const res = await fetch('mappa_file.json?t=' + new Date().getTime());
                if (!res.ok) throw new Error();
                const datiMappa = await res.json();
                mappaAlbero = datiMappa.albero || [];

                // Filtriamo le cartelle che iniziano con "orari_"
                const dirs = [...new Set(mappaAlbero
                    .filter(p => p.startsWith("orari_") && p.includes('/'))
                    .map(p => p.split('/')[0])
                )];

                numCartelle = dirs.length;
                if (numCartelle === 0) {
                    area.innerHTML = `<div class='status-message'><i class="fa-regular fa-folder-open" style="font-size:32px; color:var(--text-muted);"></i> Nessuna cartella orari trovata nell'archivio.</div>`;
                } else if (numCartelle === 1) {
                    caricaFiles(dirs[0]);
                } else {
                    area.innerHTML = "";
                    dirs.sort((a,b) => b.localeCompare(a)); // Ordina dalla più recente
                    dirs.forEach((d, index) => {
                        const btn = document.createElement('button');
                        btn.className = "folder-btn";
                        btn.style.animationDelay = `${index * 0.1}s`;
                        let label = d.replace("orari_", "").split("-").join("/");
                        btn.innerHTML = `<i class="fa-solid fa-folder" style="font-size: 20px;"></i> Orari dal ${label}`;
                        btn.onclick = () => caricaFiles(d);
                        area.appendChild(btn);
                    });
                }
            } catch (e) {
                area.innerHTML = `<div class='status-message' style="color:var(--danger); border-color:var(--danger-border); background:var(--danger-light);"><i class="fa-solid fa-triangle-exclamation" style="font-size:28px;"></i> Errore: mappa file non trovata.<br>Vai in Admin e clicca 'Forza Creazione Mappa'.</div>`;
            }
        }

        function caricaFiles(dir) {
            const area = document.getElementById('content-area');
            const pdfs = mappaAlbero
                .filter(p => p.startsWith(dir + "/") && p.toLowerCase().endsWith(".pdf"))
                .map(p => p.split('/')[1]);

            area.innerHTML = "";
            if (numCartelle > 1) {
                const b = document.createElement('button');
                b.className = "back-btn"; 
                b.innerHTML = "<i class='fa-solid fa-arrow-left'></i> Torna alle cartelle";
                b.onclick = init; 
                area.appendChild(b);
            }

            if (pdfs.length === 0) {
                const msg = document.createElement('div');
                msg.className = "status-message";
                msg.innerHTML = `<i class="fa-regular fa-folder-open" style="font-size:32px; color:var(--text-muted);"></i> Questa cartella è vuota.`;
                area.appendChild(msg);
                return;
            }

            pdfs.sort((a, b) => {
                if (a.includes("completo")) return -1;
                return a.localeCompare(b, undefined, {numeric: true});
            });

            pdfs.forEach((nomeOrig, index) => {
                let nomeVis = nomeOrig.replace(/\.pdf$/i, "").replace(/_/g, " ");
                let isCompleto = nomeOrig.includes("completo");
                
                if (isCompleto) {
                    nomeVis = "PDF Orari Completo";
                } else {
                    nomeVis = nomeVis.split(/\s+dal\s+/i)[0];
                    nomeVis = nomeVis.replace(/actv nav/i, "Orari").replace(/(\d+)b\b/gi, "$1/").trim();
                    nomeVis = nomeVis.charAt(0).toUpperCase() + nomeVis.slice(1);
                }
                
                const row = document.createElement('div'); 
                row.className = "file-row";
                row.style.animationDelay = `${index * 0.05}s`;

                const aOpen = document.createElement('a');
                aOpen.className = "file-btn"; 
                aOpen.innerHTML = `<i class="fa-solid ${isCompleto ? 'fa-file-pdf' : 'fa-clock'}" style="color: ${isCompleto ? 'var(--danger)' : 'var(--primary)'}; font-size: 20px;"></i> ${nomeVis}`;
                aOpen.href = `${dir}/${nomeOrig}`;
                aOpen.target = "_blank";
                
                const aDown = document.createElement('button');
                aDown.className = "download-btn"; 
                aDown.innerHTML = "<i class='fa-solid fa-download'></i>";
                aDown.title = "Scarica Orario";
                aDown.onclick = () => downloadForzato(`${dir}/${nomeOrig}`, nomeOrig);
                
                row.appendChild(aOpen); row.appendChild(aDown); area.appendChild(row);
            });
        }
        
        window.onload = init;
    </script>
