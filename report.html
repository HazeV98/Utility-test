    <script>
        (function applicaTema() {
            try {
                let prefStr = localStorage.getItem('preferenze_layout_haze');
                if (prefStr) {
                    let prefs = JSON.parse(prefStr);
                    let theme = prefs.theme || 'system';
                    if (theme !== 'system') {
                        document.documentElement.setAttribute('data-theme', theme);
                    } else {
                        document.documentElement.removeAttribute('data-theme');
                    }
                } else {
                    const oldTheme = localStorage.getItem('theme');
                    if (oldTheme && oldTheme !== 'system') document.documentElement.setAttribute('data-theme', oldTheme);
                }
            } catch(e) {}
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="global.js"></script>

    <style>
        /* --- CORE DESIGN SYSTEM --- */
        :root { 
            --primary: #0066cc; 
            --primary-hover: #0052a3;
            --primary-glow: rgba(0, 102, 204, 0.2);
            --bg-color: #f0f2f5; 
            --surface: #ffffff;
            --surface-hover: #f8f9fa;
            --text-main: #1a1a1a; 
            --text-muted: #5f6368;
            --border-color: #e0e0e0;
            --success: #0f9d58; 
            --danger: #d93025;
            --danger-light: #fce8e6;
            --danger-border: #fad2cf;
            --warning: #ff9800;
            --warning-light: #fff3e0;
            --info: #0088ff;
            --info-light: #e6f3ff;
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            --radius-md: 14px;
            --radius-lg: 20px;
            --transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        :root[data-theme="dark"] {
            --primary: #4da3ff; --primary-hover: #73b9ff; --primary-glow: rgba(77, 163, 255, 0.25);
            --bg-color: #0f1115; --surface: #1a1d24; --surface-hover: #232730;
            --text-main: #e8eaed; --text-muted: #9aa0a6; --border-color: #2f333d;
            --success: #34a853; --danger: #ea4335; --danger-light: rgba(234, 67, 53, 0.15); --danger-border: rgba(234, 67, 53, 0.3);
            --warning: #ffb74d; --warning-light: rgba(255, 152, 0, 0.15);
            --info: #33aaff; --info-light: rgba(51, 170, 255, 0.15);
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.3); --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.4); --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.5);
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --primary: #4da3ff; --primary-hover: #73b9ff; --primary-glow: rgba(77, 163, 255, 0.25);
                --bg-color: #0f1115; --surface: #1a1d24; --surface-hover: #232730;
                --text-main: #e8eaed; --text-muted: #9aa0a6; --border-color: #2f333d;
                --success: #34a853; --danger: #ea4335; --danger-light: rgba(234, 67, 53, 0.15); --danger-border: rgba(234, 67, 53, 0.3);
                --warning: #ffb74d; --warning-light: rgba(255, 152, 0, 0.15);
                --info: #33aaff; --info-light: rgba(51, 170, 255, 0.15);
                --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.3); --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.4); --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.5);
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
        }
        
        /* HEADER */
        .header { width: 100%; max-width: 440px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .hamburger-btn { background: none; border: none; font-size: 24px; color: var(--text-main); cursor: pointer; padding: 10px; border-radius: 50%; transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
        .hamburger-btn:active { background: var(--surface-hover); }
        h2 { margin: 0; color: var(--info); font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 8px; letter-spacing: -0.5px; }
        
        /* SIDEBAR */
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 5999; animation: fadeIn 0.3s ease; }
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background-color: var(--surface); box-shadow: var(--shadow-lg); z-index: 6000; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; overflow-y: auto;}
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 28px 24px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%); color: white; }
        .sidebar-header h3 { margin:0; font-weight: 700; display: flex; align-items: center; gap: 10px;}
        .sidebar-link { padding: 16px 24px; text-decoration: none; color: var(--text-main); font-size: 15px; font-weight: 500; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; transition: all 0.2s; }
        .sidebar-link i { width: 28px; text-align: left; font-size: 18px; color: var(--text-muted); transition: color 0.2s;}
        .sidebar-link:active, .sidebar-link:hover { background-color: var(--surface-hover); color: var(--primary); padding-left: 28px; }
        .sidebar-link:active i, .sidebar-link:hover i { color: var(--primary); }
        
        .content-area { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 16px; }

        .btn-add-main { background-color: var(--info); color: white; border: none; padding: 16px; font-size: 15px; font-weight: 700; border-radius: var(--radius-md); cursor: pointer; box-shadow: 0 4px 12px rgba(0, 136, 255, 0.3); width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; transition: all 0.2s; }
        .btn-add-main:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn-add-main:active { transform: translateY(1px); box-shadow: none; }

        .btn-cronologia-admin { display: none; background-color: var(--surface); color: var(--text-main); border: 2px solid var(--border-color); padding: 16px; font-size: 15px; font-weight: 700; border-radius: var(--radius-md); cursor: pointer; width: 100%; justify-content: center; align-items: center; gap: 10px; transition: all 0.2s; margin-bottom: 5px; }
        .btn-cronologia-admin.active { background-color: var(--info-light); border-color: var(--info); color: var(--info); }
        
        /* CARD SEGNALAZIONI */
        .report-card { background: var(--surface); padding: 20px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 12px; border-left: 6px solid var(--info); transition: transform 0.2s, box-shadow 0.2s; animation: slideInUp 0.3s ease both; position: relative;}
        .report-card.risposto { border-left-color: var(--success); }
        .report-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .report-sender { font-weight: 700; font-size: 14px; color: var(--text-main); display: flex; align-items: center; gap: 6px; }
        .report-date { font-size: 12px; color: var(--text-muted); }
        .report-body { font-size: 14px; color: var(--text-main); background: var(--surface-hover); padding: 14px; border-radius: 10px; line-height: 1.5; white-space: pre-wrap;}
        .report-link { font-size: 13px; color: var(--info); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; margin-top: 5px; font-weight: 500;}
        
        .admin-reply-box { margin-top: 8px; border-left: 3px solid var(--success); padding-left: 12px; }
        .admin-reply-title { font-size: 12px; font-weight: 700; color: var(--success); margin-bottom: 4px; display: flex; align-items: center; gap: 5px;}
        .admin-reply-text { font-size: 14px; color: var(--text-main); font-style: italic; white-space: pre-wrap;}

        .btn-group { display: flex; gap: 10px; margin-top: 5px; }
        .btn-delete { background-color: var(--surface); color: var(--danger); border: 1px solid var(--danger); padding: 10px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 6px; flex: 1; transition: all 0.2s; }
        .btn-delete:active { background-color: var(--danger-light); transform: scale(0.97); }
        .btn-reply { background-color: var(--success); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 6px; flex: 1; transition: all 0.2s; }
        .btn-reply:active { transform: scale(0.97); filter: brightness(1.1); }

        .status-badge { position: absolute; top: 16px; right: 16px; font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        .status-attesa { background: var(--warning-light); color: var(--warning); }
        .status-risolto { background: rgba(15, 157, 88, 0.15); color: var(--success); }
        .unread-dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; display: inline-block; margin-left: 5px; box-shadow: 0 0 5px var(--danger); }

        /* MODALI */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 7000; padding: 20px; box-sizing: border-box; animation: fadeIn 0.3s ease; }
        .modal-content { background-color: var(--surface); padding: 32px; border-radius: var(--radius-lg); width: 100%; max-width: 380px; text-align: left; box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto; border: 1px solid var(--border-color); position: relative;}
        
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .input-group label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .input-field, .input-group input[type="text"], .input-group input[type="url"], .input-group textarea { padding: 14px; border: 2px solid var(--border-color); border-radius: var(--radius-md); font-size: 15px; width: 100%; box-sizing: border-box; font-family: inherit; background-color: var(--surface); color: var(--text-main); transition: all 0.2s; }
        .input-field:focus, .input-group input[type="text"]:focus, .input-group input[type="url"]:focus, .input-group textarea:focus { border-color: var(--info); outline: none; box-shadow: 0 0 0 4px var(--info-light); }
        
        .btn-esegui { background-color: var(--info); color: white; border: none; padding: 16px; font-size: 15px; font-weight: 700; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 10px; margin-bottom: 12px; display: flex; justify-content: center; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-esegui:active { transform: scale(0.98); }
        .btn-esegui.success { background-color: var(--success); }
        
        .btn-chiudi { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 14px; font-size: 15px; font-weight: 600; border-radius: 12px; cursor: pointer; width: 100%; text-align: center; transition: all 0.2s;}
        .btn-chiudi:active { background-color: var(--surface-hover); }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 15px; font-weight: 500; background: var(--surface-hover); border-radius: var(--radius-md); border: 1px dashed var(--border-color); margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

            <h3 style="margin-top: 0; margin-bottom: 24px; color: var(--text-main); text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; font-weight: 800;"><i class="fa-solid fa-reply" style="color:var(--success);"></i> Rispondi a Segnalazione</h3>

                <input type="url" id="admin-rep-link" placeholder="Es. https://...">

            <button id="btn-invia-risposta" class="btn-esegui success" onclick="inviaRispostaAdmin()"><i class="fa-solid fa-check"></i> Invia Risposta</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDpamGt2bsT6TJMwnerIUTSfCVFBTJtos4", authDomain: "utility-haze.firebaseapp.com", projectId: "utility-haze", messagingSenderId: "686237947418", appId: "1:686237947418:web:f03ba19ab8fff43110a3a3" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_UID = "xm1LR5TeiKgBfuo0Htt6q3G1LdU2";
        let isAdmin = false;
        let vistaCronologia = false;
        let currentUserData = null;
        let unsubscribeReports = null;

        // UI Base
        window.apriMenuLaterale = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').style.display = 'block'; };
        window.chiudiMenuLaterale = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').style.display = 'none'; };
        
        window.apriModaleNuova = () => {
            document.getElementById('rep-messaggio').value = ''; document.getElementById('rep-link').value = '';
            document.getElementById('modal-nuova').style.display = 'flex';
        };
        window.chiudiModaleNuova = () => document.getElementById('modal-nuova').style.display = 'none';

        window.apriModaleRisposta = (id) => {
            document.getElementById('admin-rep-id').value = id;
            document.getElementById('admin-rep-messaggio').value = ''; document.getElementById('admin-rep-link').value = '';
            document.getElementById('modal-risposta').style.display = 'flex';
        };
        window.chiudiModaleRisposta = () => document.getElementById('modal-risposta').style.display = 'none';

        window.toggleVistaAdmin = () => {
            vistaCronologia = !vistaCronologia;
            const btn = document.getElementById('btn-cronologia-admin');
            if(vistaCronologia) {
                btn.innerHTML = '<i class="fa-solid fa-list-ul"></i> Torna a Segnalazioni in Attesa';
                btn.classList.add('active');
            } else {
                btn.innerHTML = '<i class="fa-solid fa-clock-rotate-left"></i> Mostra Cronologia Risposte';
                btn.classList.remove('active');
            }
            ascoltaSegnalazioni();
        };

        // Inizializzazione Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserData = user;
                isAdmin = (user.uid === ADMIN_UID);
                if (isAdmin) {
                    document.getElementById('btn-cronologia-admin').style.display = 'flex';
                }
                ascoltaSegnalazioni();
            } else {
                window.location.href = "index.html";
            }
        });

        // Fetch & Ascolto in Realtime
        function ascoltaSegnalazioni() {
            if (!currentUserData) return;
            if (unsubscribeReports) unsubscribeReports();

            const colRef = collection(db, "segnalazioni");
            let q;

            if (isAdmin) {
                if (vistaCronologia) {
                    q = query(colRef, where("stato", "==", "risposto"), orderBy("timestamp_creazione", "desc"));
                } else {
                    q = query(colRef, where("stato", "==", "in_attesa"), orderBy("timestamp_creazione", "desc"));
                }
            } else {
                q = query(colRef, where("mittente_uid", "==", currentUserData.uid), orderBy("timestamp_creazione", "desc"));
            }

            unsubscribeReports = onSnapshot(q, (snapshot) => {
                const listContainer = document.getElementById('reports-list');
                listContainer.innerHTML = '';

                if (snapshot.empty) {
                    listContainer.innerHTML = `<div class="empty-state"><i class="fa-solid fa-clipboard-check" style="font-size:32px; color:var(--border-color); display:block; margin-bottom:10px;"></i> Nessuna segnalazione presente.</div>`;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    creaCardSegnalazione(id, data, listContainer);

                    // LOGICA DI "LETTURA" PER I BANNER DI INDEX.HTML
                    if (isAdmin && !vistaCronologia && data.letta_da_admin === false) {
                        updateDoc(doc(db, "segnalazioni", id), { letta_da_admin: true }).catch(e => console.log(e));
                    } else if (!isAdmin && data.stato === "risposto" && data.letta_da_utente === false) {
                        updateDoc(doc(db, "segnalazioni", id), { letta_da_utente: true }).catch(e => console.log(e));
                    }
                });
            }, (error) => {
                console.error("Errore fetch segnalazioni:", error);
            });
        }

        function creaCardSegnalazione(id, data, container) {
            const dataCreazione = new Date(data.timestamp_creazione).toLocaleString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' });
            
            const card = document.createElement('div');
            card.className = `report-card ${data.stato === 'risposto' ? 'risposto' : ''}`;
            
            // Badge & Dot status
            let badgeHtml = '';
            let unreadDotHtml = '';

            if (data.stato === 'in_attesa') {
                badgeHtml = `<div class="status-badge status-attesa">In Attesa</div>`;
                if (isAdmin && data.letta_da_admin === false) unreadDotHtml = `<span class="unread-dot"></span>`;
            } else {
                badgeHtml = `<div class="status-badge status-risolto">Risposto</div>`;
                if (!isAdmin && data.letta_da_utente === false) unreadDotHtml = `<span class="unread-dot"></span>`;
            }

            // Link utente
            let linkHtml = data.link_allegato ? `<a href="${data.link_allegato}" target="_blank" class="report-link"><i class="fa-solid fa-link"></i> Link Utente</a>` : '';
            
            // Risposta admin
            let rispostaHtml = '';
            if (data.stato === 'risposto' && data.risposta_admin) {
                let linkRispostaHtml = data.link_risposta ? `<a href="${data.link_risposta}" target="_blank" class="report-link" style="color:var(--success);"><i class="fa-solid fa-link"></i> Link Admin</a>` : '';
                rispostaHtml = `
                <div class="admin-reply-box">
                    <div class="admin-reply-title"><i class="fa-solid fa-reply"></i> Risposta Admin</div>
                    <div class="admin-reply-text">${data.risposta_admin}</div>
                    ${linkRispostaHtml}
                </div>`;
            }

            // Bottoni
            let bottoniHtml = `<div class="btn-group">`;
            if (isAdmin && data.stato === 'in_attesa') {
                bottoniHtml += `<button class="btn-reply" onclick="apriModaleRisposta('${id}')"><i class="fa-solid fa-reply"></i> Rispondi</button>`;
            }
            if (!isAdmin || (isAdmin && data.stato === 'in_attesa' && vistaCronologia)) { 
                bottoniHtml += `<button class="btn-delete" onclick="eliminaSegnalazione('${id}')"><i class="fa-solid fa-trash-can"></i> Elimina</button>`;
            }
            bottoniHtml += `</div>`;

            card.innerHTML = `
                ${badgeHtml}
                <div class="report-header">
                    <div class="report-sender"><i class="fa-solid fa-user"></i> ${isAdmin ? data.mittente_nome : 'Tu'} ${unreadDotHtml}</div>
                </div>
                <div class="report-date">${dataCreazione}</div>
                <div class="report-body">${data.messaggio}</div>
                ${linkHtml}
                ${rispostaHtml}
                ${bottoniHtml}
            `;
            container.appendChild(card);
        }

        window.inviaSegnalazione = async () => {
            const btn = document.getElementById('btn-salva-rep');
            const testo = document.getElementById('rep-messaggio').value.trim();
            const link = document.getElementById('rep-link').value.trim();

            if (!testo) return alert("Inserisci un messaggio prima di inviare.");

            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Invio..."; btn.disabled = true;

            try {
                await addDoc(collection(db, "segnalazioni"), {
                    mittente_uid: currentUserData.uid,
                    mittente_nome: currentUserData.email || "Utente",
                    messaggio: testo,
                    link_allegato: link || null,
                    timestamp_creazione: Date.now(),
                    stato: "in_attesa",
                    letta_da_admin: false,
                    letta_da_utente: true 
                });
                chiudiModaleNuova();
            } catch (error) {
                console.error("Errore:", error);
                alert("Errore durante l'invio.");
            }
            btn.innerHTML = "<i class='fa-solid fa-paper-plane'></i> Invia ora"; btn.disabled = false;
        };

        window.inviaRispostaAdmin = async () => {
            const id = document.getElementById('admin-rep-id').value;
            const btn = document.getElementById('btn-invia-risposta');
            const testo = document.getElementById('admin-rep-messaggio').value.trim();
            const link = document.getElementById('admin-rep-link').value.trim();

            if (!testo) return alert("Inserisci una risposta.");

            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Invio..."; btn.disabled = true;

            try {
                await updateDoc(doc(db, "segnalazioni", id), {
                    stato: "risposto",
                    risposta_admin: testo,
                    link_risposta: link || null,
                    timestamp_risposta: Date.now(),
                    letta_da_utente: false // Triggera il banner all'utente su index
                });
                chiudiModaleRisposta();
            } catch (error) {
                console.error("Errore:", error);
                alert("Errore durante l'invio della risposta.");
            }
            btn.innerHTML = "<i class='fa-solid fa-check'></i> Invia Risposta"; btn.disabled = false;
        };

        window.eliminaSegnalazione = async (id) => {
            if (confirm("Vuoi davvero eliminare questa segnalazione?")) {
                try {
                    await deleteDoc(doc(db, "segnalazioni", id));
                } catch (error) {
                    alert("Errore durante l'eliminazione.");
                }
            }
        };
    </script>
</body>
</html>
